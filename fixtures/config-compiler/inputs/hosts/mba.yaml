{
  "codex": {
    "features": {
      "apps": true,
      "apps_mcp_gateway": true,
      "exec_policy": true,
      "memories": true,
      "multi_agent": true,
      "personality": true,
      "remote_compaction": true,
      "remote_models": true,
      "rmcp_client": true,
      "shell_snapshot": true,
      "shell_tool": true,
      "skills": true,
      "sqlite": true,
      "steer": true,
      "view_image_tool": true
    },
    "history": {
      "notify": [
        "bash",
        "-lc",
        "$HOME/.agents/run/codex-notify-agent-mail \"$0\""
      ],
      "persistence": "save-all"
    },
    "mcp_servers": {
      "agent-mail": {
        "bearer_token_env_var": "AGENT_MAIL_BEARER",
        "startup_timeout_sec": 30,
        "tool_timeout_sec": 60,
        "url": "http://blade:8765/mcp/"
      },
      "linear": {
        "bearer_token_env_var": "LINEAR_API_KEY",
        "startup_timeout_sec": 30,
        "tool_timeout_sec": 60,
        "url": "https://mcp.linear.app/mcp"
      },
      "playwright": {
        "args": [
          "@playwright/mcp@latest",
          "--browser",
          "chrome",
          "--executable-path=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
        ],
        "command": "npx",
        "enabled": false,
        "env": {
          "PLAYWRIGHT_BROWSERS_PATH": "$HOME/Library/Caches/ms-playwright"
        },
        "user_agent": "Codex CLI (macOS)"
      }
    },
    "notice": {
      "hide_full_access_warning": true
    },
    "otel": {
      "environment": "polli-dev",
      "exporter": {
        "otlp-http": {
          "endpoint": "http://blade:4318/v1/logs",
          "headers": {
            "x-polli-host": "mba"
          },
          "protocol": "binary"
        }
      },
      "log_user_prompt": true
    },
    "profiles": {
      "auto": {
        "approval_policy": "on-failure",
        "sandbox_mode": "workspace-write"
      },
      "full-auto": {
        "approval_policy": "never",
        "model": "gpt-5.3-codex",
        "model_reasoning_effort": "xhigh",
        "personality": "none",
        "sandbox_mode": "danger-full-access",
        "trusted_paths": [
          "/Users/caleb/.agents",
          "/Users/caleb/.oracle",
          "/Users/caleb/.claude",
          "/Users/caleb/.codex",
          "/Users/caleb/.config/polli/bin",
          "/Users/caleb/projects",
          "/Users/caleb/obsmd",
          "/Users/caleb/repo"
        ]
      },
      "runner": {
        "approval_policy": "never",
        "model": "gpt-5.3-codex",
        "model_reasoning_effort": "high",
        "personality": "none",
        "sandbox_mode": "danger-full-access",
        "trusted_paths": [
          "/Users/caleb/.agents",
          "/Users/caleb/.oracle",
          "/Users/caleb/.claude",
          "/Users/caleb/.codex",
          "/Users/caleb/.config/polli/bin",
          "/Users/caleb/projects",
          "/Users/caleb/obsmd",
          "/Users/caleb/repo"
        ]
      },
      "runner-light": {
        "approval_policy": "never",
        "model": "gpt-5.3-codex-spark",
        "model_reasoning_effort": "high",
        "personality": "none",
        "sandbox_mode": "danger-full-access",
        "trusted_paths": [
          "/Users/caleb/.agents",
          "/Users/caleb/.oracle",
          "/Users/caleb/.claude",
          "/Users/caleb/.codex",
          "/Users/caleb/.config/polli/bin",
          "/Users/caleb/projects",
          "/Users/caleb/obsmd",
          "/Users/caleb/repo"
        ]
      },
      "safe": {
        "approval_policy": "on-request",
        "sandbox_mode": "read-only"
      }
    },
    "projects": {
      "/Users/caleb/.agents": {
        "trust_level": "trusted"
      },
      "/Users/caleb/.config/polli/bin": {
        "trust_level": "trusted"
      },
