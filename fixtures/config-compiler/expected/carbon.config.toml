# Lightweight runner: gpt-5.3-codex-spark (1000+ tps, 128k ctx).
# Best for: short-horizon tasks, explore sweeps, doc generation, fast iterations.
# Avoid for: multi-step reasoning, large-context analysis, long rollouts.
[profiles.runner-light]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "high"
personality = "none"
sandbox_mode = "danger-full-access"
approval_policy = "never"
trusted_paths = [
  "/Users/carbon/.agents",
  "/Users/carbon/.oracle",
  "/Users/carbon/.claude",
  "/Users/carbon/.codex",
  "/Users/carbon/.config/polli/bin",
  "/Users/carbon/projects",
  "/Users/carbon/obsmd",
  "/Users/carbon/repo",
  "/home/caleb/.agents",
  "/home/caleb/.oracle",
  "/home/caleb/.claude",
  "/home/caleb/.codex",
  "/home/caleb/.config/polli/bin",
  "/home/caleb/projects",
  "/home/caleb/obsmd",
  "/home/caleb/repo",
  "/home/caleb/data",
  "/home/caleb/venvs",
  "/peach",
  "/banana",
  "/datasets",
  "/general",
  "/training",
  "/Users/caleb/.agents",
  "/Users/caleb/.oracle",
  "/Users/caleb/.claude",
  "/Users/caleb/.codex",
  "/Users/caleb/.config/polli/bin",
  "/Users/caleb/projects",
  "/Users/caleb/obsmd",
  "/Users/caleb/repo"
]

[profiles.auto]
sandbox_mode = "workspace-write"
approval_policy = "on-failure"

[profiles.safe]
sandbox_mode = "read-only"
approval_policy = "on-request"

# -------------------------------
# MCP servers
# -------------------------------
[mcp_servers.playwright]
command = "npx"
args = [
  "@playwright/mcp@latest",
  "--browser",
  "chrome",
  "--executable-path=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
]
enabled = false
user_agent = "Codex CLI (macOS)"

  [mcp_servers.playwright.env]
  PLAYWRIGHT_BROWSERS_PATH = "$HOME/Library/Caches/ms-playwright"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"
startup_timeout_sec = 30
tool_timeout_sec = 60
bearer_token_env_var = "LINEAR_API_KEY"

[mcp_servers.agent-mail]
url = "http://blade:8765/mcp/"
bearer_token_env_var = "AGENT_MAIL_BEARER"
startup_timeout_sec = 30
tool_timeout_sec = 60

# -------------------------------
# Features
# -------------------------------
[features]
skills = true
view_image_tool = true
rmcp_client = true
shell_tool = true
exec_policy = true
remote_compaction = true
remote_models = true
multi_agent = true
steer = true
shell_snapshot = true
apps = true
apps_mcp_gateway = true
sqlite = true
memories = true
personality = true

# -------------------------------
# History
# -------------------------------
[history]
persistence = "save-all"
notify = [
  "bash",
  "-lc",
  "$HOME/.agents/run/codex-notify-agent-mail \"$0\""
]

