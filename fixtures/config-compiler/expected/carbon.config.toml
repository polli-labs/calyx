# ===============================
# Codex CLI — Global configuration (carbon / macOS)
# ===============================

# Default profile & model
profile = "full-auto"
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "high"
model_supports_reasoning_summaries = true
show_raw_agent_reasoning = true
tool_output_token_limit = 15_000
web_search = "live"
project_doc_fallback_filenames = [ "CLAUDE.md" ]
file_opener = "cursor"
personality = "none"

# -------------------------------
# Profiles
# -------------------------------
[profiles.full-auto]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
personality = "none"
sandbox_mode = "danger-full-access"
approval_policy = "never"
trusted_paths = [
  "/Users/carbon/.agents",
  "/Users/carbon/.oracle",
  "/Users/carbon/.claude",
  "/Users/carbon/.codex",
  "/Users/carbon/.config/polli/bin",
  "/Users/carbon/projects",
