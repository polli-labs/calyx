name: ci

# Disabled on public mirror — CI runs on calyx-dev (private).
# Re-enable if external contributors start submitting PRs.
# See: polli-labs/calyx-dev/.github/workflows/ci.yml
on:
  workflow_dispatch:  # manual trigger only, for emergencies

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
