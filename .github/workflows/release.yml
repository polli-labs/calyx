name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@^11.5.1
      - run: npm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish @polli-labs/calyx-core
        run: pnpm --filter @polli-labs/calyx-core publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
      - name: Publish @polli-labs/calyx-sdk
        run: pnpm --filter @polli-labs/calyx-sdk publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
      - name: Publish @polli-labs/calyx
        run: pnpm --filter @polli-labs/calyx publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
      - name: Publish @polli-labs/calyx-web
        run: pnpm --filter @polli-labs/calyx-web publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
