name: smoke

# Disabled on public mirror — smoke runs on calyx-dev (private).
# Re-enable if external contributors start submitting PRs.
# See: polli-labs/calyx-dev/.github/workflows/smoke.yml
on:
  workflow_dispatch:  # manual trigger only, for emergencies

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node packages/cli/dist/bin.js --help
