name: smoke

on:
  pull_request:

jobs:
  smoke:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Top-level help
      - run: node packages/cli/dist/bin.js --help

      # Domain command groups
      - run: node packages/cli/dist/bin.js config --help
      - run: node packages/cli/dist/bin.js instructions --help
      - run: node packages/cli/dist/bin.js skills --help
      - run: node packages/cli/dist/bin.js tools --help
      - run: node packages/cli/dist/bin.js prompts --help
      - run: node packages/cli/dist/bin.js agents --help
      - run: node packages/cli/dist/bin.js knowledge --help
      - run: node packages/cli/dist/bin.js exec --help

      # Compatibility wrappers
      - run: node packages/cli/dist/bin.js skills-sync --help
      - run: node packages/cli/dist/bin.js skills-sync-claude --help
      - run: node packages/cli/dist/bin.js skills-sync-codex --help
      - run: node packages/cli/dist/bin.js prompts-sync-claude --help
      - run: node packages/cli/dist/bin.js prompts-sync-codex --help
      - run: node packages/cli/dist/bin.js agents-render --help
      - run: node packages/cli/dist/bin.js exec-launch --help
