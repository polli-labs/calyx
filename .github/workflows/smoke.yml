name: smoke

on:
  pull_request:

jobs:
  smoke:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node packages/cli/dist/bin.js --help
      - run: node packages/cli/dist/bin.js config --help
      - run: node packages/cli/dist/bin.js instructions --help
